<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
<title>🐭</title>
<style>
  :root { --bar-h: 4px; }
  html, body { height: 100%; }
  body {
    background: #000;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    color: #fff;
  }
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  /* Image */
  #photo {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    will-change: transform;
    transition: transform 0.12s ease-out;
    transform-origin: 50% 50%;
    touch-action: none;           /* custom gestures */
    user-select: none;
    -webkit-user-drag: none;      /* prevent native drag */
    cursor: default;
  }
  #photo.canzoom { cursor: zoom-in; }
  #photo.canzoom.zoomed { cursor: grab; }
  #photo.dragging { cursor: grabbing; }

  /* Progress bar (fixed overlay at bottom) */
  #progress {
    position: fixed;
    left: 0;
    bottom: calc(env(safe-area-inset-bottom, 0));
    width: 100%;
    height: var(--bar-h);
    pointer-events: none;
    z-index: 9999;
    background: rgba(255,255,255,0.06); /* subtle track */
  }
  #progressFill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #8a2be2, #00bfff);
    transition: none; /* we set it in JS */
    will-change: width;
  }
</style>
</head>
<body>
  <div id="progress"><div id="progressFill"></div></div>
  <div class="stage">
    <img id="photo"
    src="https://&#115;&#116;&#97;&#114;.&#99;&#117;&#98;.&#112;&#111;&#114;&#110;:10443/x.jpg" alt="" draggable="false" />
  </div>

<script>
(function(){
  'use strict';
  // ================= Epoch-synced refresh =================
  const SLOT_MS = 30_000;   // 30s slots
  const OFFSET_MS = 5_000;  // fire when (time % 30s) == 5s

  function slotState(t){
    // adjusted is elapsed-in-slot with 5s offset
    const adjusted = ((t - OFFSET_MS) % SLOT_MS + SLOT_MS) % SLOT_MS; // 0..SLOT_MS
    const remaining = SLOT_MS - adjusted; // ms left to next boundary
    const fracRemaining = remaining / SLOT_MS; // 1..0
    return { adjusted, remaining, fracRemaining };
  }

  function animateBar(){
    const fill = document.getElementById('progressFill');
    if (!fill) return 0;
    const { remaining, fracRemaining } = slotState(Date.now());
    // Set to current fraction, then animate to 0
    fill.style.transition = 'none';
    fill.style.width = (fracRemaining * 100) + '%';
    // force reflow
    void fill.offsetWidth;
    fill.style.transition = `width ${remaining}ms linear`;
    fill.style.width = '0%';
    return remaining;
  }

  function scheduleRefresh(){
    const delay = animateBar();
    clearTimeout(window._epochTimer);
    window._epochTimer = setTimeout(()=> location.reload(), delay);
  }

  // Resync on return/rotate
  document.addEventListener('visibilitychange', ()=>{ if (!document.hidden) scheduleRefresh(); }, { passive:true });
  window.addEventListener('orientationchange', scheduleRefresh, { passive:true });
  window.addEventListener('pageshow', scheduleRefresh, { passive:true });

  // ================= Zoom/Pan (fit <-> full-res) =================
  const img = document.getElementById('photo');
  const state = {
    scale: 1,
    fullScale: 1,
    tx: 0, ty: 0,
    dragging: false,
    startX: 0, startY: 0,
    canZoom: false
  };

  function setTransform(){
    img.style.transform = `translate3d(${state.tx}px, ${state.ty}px, 0) scale(${state.scale})`;
    img.classList.toggle('zoomed', state.scale > 1.001);
  }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function center(){ return { x: innerWidth/2, y: innerHeight/2 }; }

  function computeFullScale(){
    // Fit size (current on-screen) vs natural image size
    const r = img.getBoundingClientRect();
    const dw = r.width || 1, dh = r.height || 1;
    const nw = img.naturalWidth || dw, nh = img.naturalHeight || dh;
    const sx = nw / dw, sy = nh / dh;
    state.fullScale = Math.max(sx, sy, 1);
    state.canZoom = state.fullScale > 1.001;
    img.classList.toggle('canzoom', state.canZoom);
    if (!state.canZoom){
      state.scale = 1; state.tx = 0; state.ty = 0; setTransform();
    }
  }

  function zoomKeepingPoint(newScale, x, y){
    newScale = clamp(newScale, 1, state.fullScale);
    const oldScale = state.scale;
    const s = newScale / oldScale;
    const c = center();
    state.tx = (state.tx - (x - c.x)) * s + (x - c.x);
    state.ty = (state.ty - (y - c.y)) * s + (y - c.y);
    state.scale = newScale;
    setTransform();
  }
  function zoomToggleAt(x,y){
    if (!state.canZoom) return;
    if (state.scale <= 1.001){
      // zoom to full-res, center the clicked point
      zoomKeepingPoint(state.fullScale, x, y);
      // then bring that point to exact center
      const c = center();
      state.tx += (c.x - x);
      state.ty += (c.y - y);
      setTransform();
    } else {
      state.scale = 1; state.tx = 0; state.ty = 0; setTransform();
    }
  }

  // Mouse / Desktop
  img.addEventListener('click', (e)=>{
    if (e.button !== 0) return;
    zoomToggleAt(e.clientX, e.clientY);
  }, { passive:true });

  img.addEventListener('mousedown', (e)=>{
    if (e.button !== 0) return;
    if (state.scale <= 1.001) return; // only pan when zoomed
    e.preventDefault();
    state.dragging = true; state.startX = e.clientX; state.startY = e.clientY;
    img.classList.add('dragging');
  }, { passive:false });

  window.addEventListener('mousemove', (e)=>{
    if (!state.dragging) return;
    e.preventDefault();
    state.tx += (e.clientX - state.startX);
    state.ty += (e.clientY - state.startY);
    state.startX = e.clientX; state.startY = e.clientY;
    setTransform();
  }, { passive:false });

  window.addEventListener('mouseup', ()=>{
    state.dragging = false; img.classList.remove('dragging');
  }, { passive:true });

  // Wheel / touchpad
  img.addEventListener('wheel', (e)=>{
    if (!state.canZoom) return; // allow normal scroll if ever applicable
    if (e.ctrlKey){ // pinch-to-zoom
      e.preventDefault();
      const zoomFactor = Math.pow(1.0015, -e.deltaY);
      zoomKeepingPoint(clamp(state.scale * zoomFactor, 1, state.fullScale), e.clientX, e.clientY);
    } else if (state.scale > 1.001){ // pan with two-finger scroll
      e.preventDefault();
      state.tx -= e.deltaX; state.ty -= e.deltaY; setTransform();
    }
  }, { passive:false });

  // Touch (mobile)
  const touch = { active:false, startDist:0, startScale:1, mid:null, last:null };
  function touches(ev){ return Array.from(ev.touches).map(t=>({x:t.clientX, y:t.clientY})); }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function mid(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }

  img.addEventListener('touchstart', (e)=>{
    if (!state.canZoom) return;
    if (e.touches.length === 2){
      e.preventDefault();
      const [a,b] = touches(e);
      touch.active = true; touch.startDist = dist(a,b); touch.startScale = state.scale; touch.mid = mid(a,b);
    } else if (e.touches.length === 1 && state.scale > 1.001) {
      touch.last = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    }
  }, { passive:false });

  img.addEventListener('touchmove', (e)=>{
    if (!state.canZoom) return;
    if (e.touches.length === 2 && touch.active){
      e.preventDefault();
      const [a,b] = touches(e); const m = mid(a,b);
      const factor = dist(a,b) / (touch.startDist || 1);
      zoomKeepingPoint(clamp(touch.startScale * factor, 1, state.fullScale), m.x, m.y);
    } else if (e.touches.length === 1 && touch.last && state.scale > 1.001){
      e.preventDefault();
      const p = {x:e.touches[0].clientX, y:e.touches[0].clientY};
      state.tx += (p.x - touch.last.x); state.ty += (p.y - touch.last.y); touch.last = p; setTransform();
    }
  }, { passive:false });

  img.addEventListener('touchend', ()=>{ touch.active = false; }, { passive:true });
  img.addEventListener('touchcancel', ()=>{ touch.active = false; }, { passive:true });

  // Init (after image dimensions known) + refresh timer
  function init(){
    if (img.complete){ computeFullScale(); }
    else { img.addEventListener('load', computeFullScale, { once:true }); }
    scheduleRefresh();
  }
  window.addEventListener('load', init, { once:true });
  window.addEventListener('resize', ()=>{ const wasZoomed = state.scale > 1.001; computeFullScale(); if (!state.canZoom || !wasZoomed){ state.scale=1; state.tx=0; state.ty=0; setTransform(); } }, { passive:true });
})();
</script>
</body>
</html>
